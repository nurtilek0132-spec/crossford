<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кроссворд - 50 Уровней</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Фоновые частицы -->
    <div class="particles" id="particles"></div>

    <!-- Конфетти -->
    <div class="confetti-container" id="confetti"></div>

    <!-- Уведомление -->
    <div class="toast" id="toast">
        <span class="toast-icon" id="toastIcon"></span>
        <span class="toast-message" id="toastMessage"></span>
    </div>

    <!-- Модальное окно завершения уровня -->
    <div class="modal-overlay" id="levelModal">
        <div class="modal">
            <div class="modal-icon">🎉</div>
            <div class="modal-stars" id="modalStars">
                <span class="star" data-star="1">⭐</span>
                <span class="star" data-star="2">⭐</span>
                <span class="star" data-star="3">⭐</span>
            </div>
            <h2 class="modal-title">Уровень пройден!</h2>
            <p class="modal-subtitle" id="modalAnswer"></p>
            <div class="modal-stats">
                <div class="modal-stat">
                    <span>🎯 Очки:</span>
                    <span id="modalScore">+100</span>
                </div>
                <div class="modal-stat">
                    <span>🔥 Серия:</span>
                    <span id="modalStreak">x1</span>
                </div>
                <div class="modal-stat">
                    <span>💡 Подсказок:</span>
                    <span id="modalHints">0</span>
                </div>
            </div>
            <button class="btn btn-primary" id="nextLevelBtn">
                <span>Следующий уровень</span>
                <span class="btn-arrow">→</span>
            </button>
        </div>
    </div>

    <!-- Модальное окно завершения игры -->
    <div class="modal-overlay" id="gameCompleteModal">
        <div class="modal modal-complete">
            <div class="modal-icon">👑</div>
            <h2 class="modal-title">Игра пройдена!</h2>
            <p class="modal-subtitle">Вы настоящий эрудит! Все 50 уровней позади.</p>
            <div class="modal-final-score">
                <span>Итоговый счёт:</span>
                <span class="final-score-value" id="finalScore">0</span>
            </div>
            <div class="modal-achievements" id="achievements"></div>
            <button class="btn btn-primary" id="restartBtn">
                <span>🔄</span>
                <span>Играть заново</span>
            </button>
        </div>
    </div>

    <!-- Игровой контейнер -->
    <main class="game-container">
        <!-- Шапка -->
        <header class="game-header">
            <h1 class="game-logo">Crossword</h1>
            <div class="game-meta">
                <span class="level-badge" id="levelBadge">1 / 50</span>
                <div class="score-badge">
                    <span>💎</span>
                    <span id="scoreDisplay">0</span>
                </div>
                <div class="streak-badge" id="streakBadge" style="display:none;">
                    <span>🔥</span>
                    <span id="streakDisplay">x1</span>
                </div>
            </div>
        </header>

        <!-- Прогресс -->
        <div class="progress-bar-wrapper">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <!-- Вопрос -->
        <div class="question-card">
            <div class="question-label">Вопрос</div>
            <p class="question-text" id="questionText">Загрузка...</p>
            <div class="question-hint" id="hintBlock">
                <span>💡</span>
                <span id="hintText">Нажмите "Подсказка" если нужно</span>
            </div>
        </div>

        <!-- Сетка кроссворда -->
        <div class="grid-wrapper" id="gridWrapper"></div>

        <!-- Кнопки -->
        <div class="controls">
            <button class="btn btn-hint" id="hintBtn">
                <span>💡</span>
                <span>Подсказка</span>
                <span class="badge" id="hintCount">3</span>
            </button>
            <button class="btn btn-check" id="checkBtn">
                <span>✓</span>
                <span>Проверить</span>
            </button>
            <button class="btn btn-reset" id="resetBtn">
                <span>↺</span>
                <span>Сброс</span>
            </button>
        </div>

        <!-- Подсказка по клавишам -->
        <p class="keyboard-hint">← → навигация • Enter проверить • Backspace удалить</p>
    </main>

    <script src="script.js"></script>
</body>
</html>
